<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta property="og:title" content="【速報】いま話題になっている件">
  <meta property="og:description" content="今すぐチェック">
  <meta property="og:image" content="yahoo.jpg">
  <meta property="og:type" content="article">

  <title>Threadsまとめ</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:"Noto Sans JP",sans-serif;
      background:#efefef;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px;
    }

    .wrap{
      width:min(92vw,720px);
    }

    .card{
      display:block;
      text-decoration:none;
      color:inherit;
      background:#fff;
      border-radius:34px;
      overflow:hidden;
      box-shadow:0 18px 40px rgba(0,0,0,.12);
      transition:transform .15s ease, box-shadow .15s ease;
    }

    .card:hover{
      transform:translateY(-2px);
      box-shadow:0 22px 46px rgba(0,0,0,.14);
    }

    .thumb{
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      display:block;
      background:#6f8eb6;
    }

    .content{
      padding:26px 26px 30px;
    }

    .title{
      font-size:clamp(24px,3.2vw,44px);
      font-weight:900;
      line-height:1.35;
      color:#171725;
      letter-spacing:.01em;
      margin-bottom:22px;
    }

    .cta{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      width:100%;
      min-height:84px;
      border-radius:24px;
      color:#fff;
      font-size:clamp(22px,2.8vw,34px);
      font-weight:900;
      background:linear-gradient(90deg,#617df2 0%, #8a4fc3 100%);
      box-shadow:0 8px 20px rgba(109,92,214,.28);
    }

    .arrow{
      font-size:1.2em;
      line-height:1;
      transform:translateY(-1px);
    }

    @media (max-width: 520px){
      body{
        padding:16px;
      }

      .card{
        border-radius:28px;
      }

      .content{
        padding:20px 20px 24px;
      }

      .cta{
        min-height:72px;
        border-radius:20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="card" href="https://lite.tiktok.com/t/ZS98Fh6DjyDLU-a6xjv/">
      <img
        class="thumb"
        src="yahoo.jpg"
        alt="記事サムネイル"
      >

      <div class="content">
        <div class="title">【速報】いま話題になっている件</div>

        <div class="cta">
          <span class="arrow">→</span>
          <span>記事の続きを読む</span>
        </div>
      </div>
    </a>
  </div>
</body>
</html>
